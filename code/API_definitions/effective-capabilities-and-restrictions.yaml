openapi: 3.0.3
info:
  title: Effective Capabilities and Restrictions
  description: |
    The Effective Capabilities and Restrictions API lets an API Consumer
    discover, before invocation, the producer-specific restrictions that apply
    to one or more released CAMARA APIs in the context of a specific end-user
    device. The producer returns, per requested CAMARA API, a standard
    OpenAPI Overlay document — pinned to version
    [**Overlay 1.1.0**](https://spec.openapis.org/overlay/v1.1.0.html)
    — that the consumer can apply locally to the corresponding CAMARA API
    specification to obtain a strictly-valid view of the API for that
    device-context.

    This file is the Overlay-1.1.0-targeted sibling of
    `effective-capabilities-and-restrictions.yaml`, which targets Overlay
    1.0.0. The two variants are kept side-by-side so that consuming
    deployments can pick the Overlay version they support; they are NOT
    compatible on the wire (returned overlay documents carry different
    `overlay` version strings and the 1.1.0 variant forbids the `copy`
    action introduced upstream — see "Restriction-only semantics" below).

    Note on Overlay versioning: this API targets the Overlay Specification
    **version 1.1.0** specifically. Returned overlay documents will carry
    `overlay: "1.1.0"` in their root field, and the schema referenced from
    [`../modules/openapi-overlay-1.1.0.yaml`](../modules/openapi-overlay-1.1.0.yaml)
    mirrors Overlay 1.1.0 exclusively. Consumers MUST NOT assume that
    [`https://spec.openapis.org/overlay/latest.html`](https://spec.openapis.org/overlay/latest.html)
    resolves to 1.1.0 — that URL follows the upstream release train and may
    resolve to an Overlay version newer than 1.1.0. Adoption of a newer
    Overlay version by this API would be a breaking change requiring a new
    API version.

    # Restriction-only semantics

    Producers MUST emit only restrictive `actions[]` in every overlay returned
    or delivered by this API. An action is restrictive when it either:

    - sets `remove: true` to delete an existing node from the target document, or
    - sets `update: { ... }` whose top-level keys narrow the target node using
      JSON Schema validation keywords — for example, an `enum` that is a strict
      subset of the existing enum, a lowered `maximum`/`maxLength`/`maxItems`,
      a raised `minimum`/`minLength`/`minItems`, a tightened `pattern`, a
      `uniqueItems: true` constraint, or a `required` array that adds
      previously-optional properties.

    Overlay 1.1.0 adds an optional `copy` field to the Action Object whose
    semantics (injecting a value drawn from elsewhere in the target document
    into the node selected by `target`) are not intrinsically restrictive:
    a `copy` can just as easily widen as narrow the contract, and validating
    "did this copy actually narrow the target's schema?" requires comparing
    the JSON Schema at the copy source against the JSON Schema at the
    target — meaningfully more complex than the keyword-level check used for
    `update`. To keep validation tractable, this API forbids `copy`
    outright: producers MUST NOT emit any action that carries a `copy`
    field, and consumers MUST reject any overlay containing such an action.
    Restrictive intent for this API is fully expressible with `remove` and
    `update`.

    Precedence among the mutating fields follows Overlay 1.1.0 unchanged:
    `remove: true` overrides both `update` and `copy`, and `update` and
    `copy` are mutually exclusive on a single action. Combined with the
    rule above, a well-formed restrictive action under this API carries
    exactly one of `remove: true` or a narrowing `update: { ... }`, never
    both, and never carries `copy`.

    Consumers MUST reject any overlay whose actions broaden the target
    document — for example, actions that add new operations, widen an `enum`,
    introduce new `oneOf` branches, raise a `maximum`, lower a `required`
    array, or otherwise relax the contract of the underlying CAMARA API.

    **Capabilities are signaled by the absence of a restriction**: any element
    of the target CAMARA API specification that is *not* referenced by an
    `action.target` in the returned overlay is supported by the producer with
    the unmodified semantics defined by that CAMARA API. The overlay therefore
    enumerates only the producer-specific narrowings; consumers infer
    capabilities from what the overlay leaves untouched.

    # Operation model

    The single operation `POST /retrieve-effective-overlay` accepts a list of
    CAMARA API specification URLs (released GitHub versions) and a `device`
    context. It has two delivery modes selected by whether the request carries
    a `sink`:

    - **Synchronous** (no `sink`/`sinkCredential`): the producer evaluates the
      request and returns `200 OK` with an array of OpenAPI Overlay 1.1.0
      documents, one per requested API, in the same order as the request's
      `apis[]`.
    - **Asynchronous (implicit subscription)** (`sink` and `sinkCredential`
      both present): the producer returns `202 Accepted` immediately with an
      echo of the registered `sink` (never the credential), and delivers each
      computed overlay later via the sink as a single non-batch CloudEvent of
      type
      `org.camaraproject.effective-capabilities-and-restrictions.v0.overlay-updated`,
      one CloudEvent per requested API. Subsequent producer-side state changes
      (for example, the device moves to a new footprint) result in additional
      CloudEvents of the same type carrying the updated overlay for the
      affected API.

    # End-to-end flow at a glance

    ```text
       App Backend          ECR Producer            Upstream CAMARA
       (Consumer)           (this API)              API (e.g. QoD)
            |                     |                        |
            | (a) [dev-time, one-time] developer or        |
            |     build pipeline fetches the upstream      |
            |     CAMARA spec (e.g. QoD r3.2) and          |
            |     bundles/ships it with the app            |
            |--------------------------------------------->|
            |<---------------------------------------------|
            |                     |                        |
            |    = = = = = = = = = = = = = = = = = =       |
            |             runtime (per device)             |
            |                     |                        |
            | (b) POST /retrieve-effective-overlay         |
            |     { apis:[<qod-url>], device:{...} }       |
            |-------------------->|                        |
            |                     | resolve (device, api): |
            |                     |  producer policy +     |
            |                     |  device footprint      |
            | (c) 200 OK          |                        |
            |     [{ overlay:"1.1.0",                      |
            |        extends:"<qod-url>",                  |
            |        actions:[ remove,                     |
            |                  update{enum},               |
            |                  update{maximum}, ... ] }]   |
            |<--------------------|                        |
            |                     |                        |
            | (d) apply overlay locally to cached spec     |
            |     => effective contract for THIS device    |
            |                     |                        |
            | (e) drive UI; pre-validate request bodies    |
            |     against the effective contract           |
            |                     |                        |
            | (f) POST upstream call (e.g. /sessions),     |
            |     pre-validated vs. the narrowed schema    |
            |--------------------------------------------->|
            |<---------------------------------------------|
            |     200/201 -- no surprise 422s              |
    ```

    Async variant: if the request body also carries `sink` and
    `sinkCredential`, step (c) becomes `202 Accepted` (echoing only the
    `sink`) and the producer later POSTs `overlay-updated` CloudEvents to
    the sink — once on the initial evaluation and once on each subsequent
    effective-view change. The consumer replaces its cached overlay for
    `data.api` and re-applies, then re-renders step (e) without
    re-mounting the form.

    # Recovery

    Notification delivery is at-most-once. To recover from a missed
    notification, a consumer simply re-issues the original
    `POST /retrieve-effective-overlay` request: the operation is idempotent
    and the response always reflects the producer's current effective view for
    the supplied context. There is no bitmap, no `mappingVersion`, no resync
    state machine.

    # Authorization and authentication

    The "Authorization and authentication" common guidelines, defined in
    [Commonalities](https://github.com/camaraproject/Commonalities/blob/main/documentation/CAMARA-API-access-and-user-consent.md),
    apply to this API. The API uses OpenID Connect (OIDC) authentication, and
    grant management via CIBA. The required scope for the
    `retrieveEffectiveOverlay` operation is
    `effective-capabilities-and-restrictions:retrieve-effective-overlay`, which
    grants the right to retrieve the effective overlay for a given device.
    Callback (`sink`) authentication is conveyed out-of-band by the
    `sinkCredential` supplied with the request; the credential itself is never
    echoed in any response.

    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive.
    Therefore the API specification may not document some non-mandatory error
    statuses such as 504 (Gateway Timeout) introduced by Commonalities.
    Consumers MUST be prepared to handle other error responses than those
    listed here. Where appropriate, error responses follow the standard
    CAMARA error structure defined in `CAMARA_common.yaml`.

