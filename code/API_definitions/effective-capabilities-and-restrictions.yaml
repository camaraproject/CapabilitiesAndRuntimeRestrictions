  version: wip
  x-camara-commonalities: 0.8.0-rc.2

externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/

servers:
  - url: "{apiRoot}/effective-capabilities-and-restrictions/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: |
          API root, defined by the service provider, e.g.
          `api.example.com` or `api.example.com/somepath`.

tags:
  - name: Effective Overlay
    description: |
      Retrieve producer-specific effective overlay documents for one or more
      CAMARA APIs in the context of a given device. Optionally subscribe to
      overlay updates via an implicit `sink` callback.

security:
  - openId:
      - effective-capabilities-and-restrictions:retrieve-effective-overlay

paths:
  /retrieve-effective-overlay:
    post:
      tags:
        - Effective Overlay
      summary: Retrieve the effective overlay for one or more CAMARA APIs
      description: |
        Computes the producer-specific effective overlay for each CAMARA API
        listed in `apis[]`, in the context of the supplied `device`.

        - If neither `sink` nor `sinkCredential` is supplied, returns
          `200 OK` synchronously with an array of
          [OpenAPI Overlay 1.1.0](https://spec.openapis.org/overlay/v1.1.0.html)
          documents, one per entry in `apis[]`, in the same order as the
          request.
        - If both `sink` and `sinkCredential` are supplied, returns
          `202 Accepted` with no overlays in the body (the response echoes
          only the registered `sink`) and the producer subsequently delivers
          one CloudEvent of type
          `org.camaraproject.effective-capabilities-and-restrictions.v0.overlay-updated`
          per requested API via the registered `sink`. Additional CloudEvents
          of the same type are delivered whenever the effective overlay for
          any of the requested APIs changes.

        The operation is idempotent: repeating the same request returns the
        same effective overlay set (or schedules the same async delivery) for
        a stable producer-side configuration. To recover from a missed
        notification, simply re-issue the request.
      operationId: retrieveEffectiveOverlay
      parameters:
        - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveEffectiveOverlayRequest"
      callbacks:
        overlayUpdated:
          "{$request.body#/sink}":
            post:
              summary: "overlay-updated notification callback"
              description: |
                Important: this endpoint is to be implemented by the API
                consumer. The Effective Capabilities and Restrictions producer
                POSTs to this endpoint once per affected CAMARA API whenever
                the effective overlay changes for the device-context of an
                active asynchronous request. Each notification is a single
                (non-batch) CloudEvent.
              operationId: postOverlayUpdated
              parameters:
                - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
              requestBody:
                required: true
                content:
                  application/cloudevents+json:
                    schema:
                      $ref: "#/components/schemas/OverlayUpdatedEvent"
              responses:
                "204":
                  description: Successful notification
                  headers:
                    x-correlator:
                      $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
                "400":
                  $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
                "401":
                  $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
                "403":
                  $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
                "410":
                  $ref: "../common/CAMARA_common.yaml#/components/responses/Generic410"
                "429":
                  $ref: "../common/CAMARA_common.yaml#/components/responses/Generic429"
              security:
                - {}
                - notificationsBearerAuth: []
      responses:
        "200":
          description: |
            Synchronous response. The body is an array of
            [OpenAPI Overlay 1.1.0](https://spec.openapis.org/overlay/v1.1.0.html)
            documents, one per entry in the request's `apis[]`, in the same
            order. Returned only when the request omits both `sink` and
            `sinkCredential`.
          headers:
            x-correlator:
              $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                type: array
                minItems: 1
                maxItems: 20
                description: |
                  One [OpenAPI Overlay 1.1.0](https://spec.openapis.org/overlay/v1.1.0.html)
                  document per requested CAMARA API, in the same order as the
                  request's `apis[]`. Each document carries `overlay: "1.1.0"`
                  in its root field.
                items:
                  $ref: "../modules/openapi-overlay-1.1.0.yaml#/components/schemas/Overlay"
        "202":
          description: |
            Asynchronous acceptance. Returned only when both `sink` and
            `sinkCredential` are present in the request. No overlays are
            included in the body; the producer will deliver one CloudEvent
            of type
            `org.camaraproject.effective-capabilities-and-restrictions.v0.overlay-updated`
            per requested API to the registered `sink`. The body echoes only
            the registered `sink` so the consumer can confirm the value the
            producer captured. The `sinkCredential` is never echoed.
          headers:
            x-correlator:
              $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveEffectiveOverlayAccepted"
        "400":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
        "401":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
        "403":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
        "404":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic404"
        "422":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic422"
        "429":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic429"
        "500":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic500"
        "503":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic503"

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"
    notificationsBearerAuth:
      $ref: "../common/CAMARA_event_common.yaml#/components/securitySchemes/notificationsBearerAuth"

  schemas:

    # ─────────────────────────────────────────────────────────────────────────
    # Device (inline)
    #
    # Inlined per design contract: this API exposes `device` as its sole wire
    # context input. The shape mirrors the canonical CAMARA Device but is
    # declared locally with no $refs to ../common so the wire contract for
    # this API is fully self-contained.
    # ─────────────────────────────────────────────────────────────────────────

    Device:
      description: |
        End-user equipment able to connect to a mobile network. Examples
        include smartphones and IoT sensors/actuators.

        The API Consumer can provide one or more of the following identifiers
        and the API Producer will use one identifier of its choice for the
        producer-side policy evaluation:
          - `phoneNumber`
          - `networkAccessIdentifier`
          - `ipv4Address`
          - `ipv6Address`

        At least one identifier MUST be present.
      type: object
      minProperties: 1
      properties:
        phoneNumber:
          type: string
          pattern: '^\+[1-9][0-9]{4,14}$'
          maxLength: 16
          description: |
            A public identifier addressing a telephone subscription. In mobile
            networks it corresponds to the MSISDN, formatted in international
            E.164 form prefixed with `+`.
          example: "+123456789"
        networkAccessIdentifier:
          type: string
          maxLength: 2048
          description: |
            A public identifier addressing a subscription in a mobile network.
            In 3GPP terminology, it corresponds to the GPSI formatted with the
            External Identifier (`{Local Identifier}@{Domain Identifier}`).
          example: "123456789@example.com"
        ipv4Address:
          $ref: "#/components/schemas/DeviceIpv4Address"
        ipv6Address:
          type: string
          format: ipv6
          maxLength: 45
          description: |
            The device should be identified by the observed IPv6 address, or
            by any single IPv6 address from within the subnet allocated to the
            device.
          example: "2001:db8:85a3:8d3:1319:8a2e:370:7344"

    DeviceIpv4Address:
      description: |
        The device IPv4 identification. `publicAddress` MUST always be present;
        in addition, at least one of `privateAddress` or `publicPort` MUST be
        present so the device can be uniquely identified through NAT.
      type: object
      properties:
        publicAddress:
          type: string
          format: ipv4
          maxLength: 15
          description: A single public (observed) IPv4 address.
          example: "84.125.93.10"
        privateAddress:
          type: string
          format: ipv4
          maxLength: 15
          description: A single private (allocated) IPv4 address.
          example: "10.0.0.5"
        publicPort:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          description: TCP or UDP source port observed at the application server.
          example: 59765
      anyOf:
        - required: [publicAddress, privateAddress]
        - required: [publicAddress, publicPort]

    # ─────────────────────────────────────────────────────────────────────────
    # Request body
    # ─────────────────────────────────────────────────────────────────────────

    RetrieveEffectiveOverlayRequest:
      description: |
        Request body for `POST /retrieve-effective-overlay`. Carries the list
        of CAMARA APIs to evaluate, the device context, and (optionally) an
        implicit-subscription `sink` + `sinkCredential` pair selecting
        asynchronous delivery.

        Either both `sink` and `sinkCredential` are present (asynchronous
        mode, `202` response) or neither is present (synchronous mode,
        `200` response).
      type: object
      required:
        - apis
      properties:
        apis:
          type: array
          minItems: 1
          maxItems: 20
          uniqueItems: true
          description: |
            One or more URLs identifying released GitHub versions of CAMARA
            API specifications for which the producer's effective overlay is
            requested. The producer returns one overlay per entry, in the
            same order.
          items:
            type: string
            format: uri
            maxLength: 2048
            description: |
              URL of a released version of a CAMARA API specification on
              GitHub, e.g.
              `https://github.com/camaraproject/QualityOnDemand/blob/r2.2/code/API_definitions/quality-on-demand.yaml`.
            example: "https://github.com/camaraproject/QualityOnDemand/blob/r2.2/code/API_definitions/quality-on-demand.yaml"
        device:
          $ref: "#/components/schemas/Device"
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: '^https://.+$'
          description: |
            HTTPS URL at which the API Consumer is willing to receive
            `overlay-updated` CloudEvents. Presence of this property (together
            with `sinkCredential`) selects the asynchronous delivery mode and
            implicitly subscribes the consumer to overlay updates for the
            requested APIs.
          example: "https://consumer.example.com/effective-overlay/notifications"
        sinkCredential:
          $ref: "../common/CAMARA_event_common.yaml#/components/schemas/SinkCredential"

    # ─────────────────────────────────────────────────────────────────────────
    # Accepted response (async mode)
    #
    # Echoes only the registered `sink` so the consumer can confirm the value
    # the producer captured. The `sinkCredential` is never echoed.
    # ─────────────────────────────────────────────────────────────────────────

    RetrieveEffectiveOverlayAccepted:
      description: |
        Acknowledges acceptance of an asynchronous request. Echoes only the
        registered `sink`; overlays are delivered later via CloudEvents and
        are not part of this response.
      type: object
      required:
        - sink
      properties:
        sink:
          type: string
          format: uri
          maxLength: 2048
          description: |
            The HTTPS sink URL the producer has registered for this request.
            Echoed verbatim from the request body for consumer confirmation.
          example: "https://consumer.example.com/effective-overlay/notifications"

    # ─────────────────────────────────────────────────────────────────────────
    # CloudEvent notification
    # ─────────────────────────────────────────────────────────────────────────

    OverlayUpdatedEventType:
      type: string
      description: |
        The single CloudEvent type emitted by this API. One CloudEvent is
        delivered per affected CAMARA API.
      enum:
        - org.camaraproject.effective-capabilities-and-restrictions.v0.overlay-updated

    OverlayUpdatedEventData:
      description: |
        Payload of an `overlay-updated` CloudEvent. Identifies the CAMARA API
        whose effective overlay has changed and carries the full replacement
        overlay document. Consumers replace any prior overlay for `api` with
        `overlay`.
      type: object
      required:
        - api
        - overlay
      properties:
        api:
          type: string
          format: uri
          maxLength: 2048
          description: |
            URL of the CAMARA API specification whose effective overlay has
            changed. Matches one of the entries in the original request's
            `apis[]`.
          example: "https://github.com/camaraproject/QualityOnDemand/blob/r2.2/code/API_definitions/quality-on-demand.yaml"
        overlay:
          $ref: "../modules/openapi-overlay-1.1.0.yaml#/components/schemas/Overlay"

    OverlayUpdatedEvent:
      description: |
        CloudEvents 1.0 envelope for an `overlay-updated` notification. The
        `type` is constrained to the single value defined by this API and the
        `data` payload carries the replacement overlay for one CAMARA API.
      allOf:
        - $ref: "../common/CAMARA_event_common.yaml#/components/schemas/CloudEvent"
        - type: object
          required:
            - type
            - data
          properties:
            type:
              $ref: "#/components/schemas/OverlayUpdatedEventType"
            data:
              $ref: "#/components/schemas/OverlayUpdatedEventData"
